name: Build Windows App

on:
  push:
    branches: [ "windows-version" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "windows-version" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore ClaudeUsage.Windows/ClaudeUsage.Windows/ClaudeUsage.Windows.csproj
      
    - name: Build
      run: dotnet build ClaudeUsage.Windows/ClaudeUsage.Windows/ClaudeUsage.Windows.csproj --no-restore -c Release
      
    - name: Publish x64
      run: dotnet publish ClaudeUsage.Windows/ClaudeUsage.Windows/ClaudeUsage.Windows.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish-x64
      
    - name: Publish ARM64
      run: dotnet publish ClaudeUsage.Windows/ClaudeUsage.Windows/ClaudeUsage.Windows.csproj -c Release -r win-arm64 --self-contained true -p:PublishSingleFile=true -o ./publish-arm64
      
    - name: Zip x64
      run: Compress-Archive -Path ./publish-x64/* -DestinationPath ClaudeUsage-Windows-x64.zip
      
    - name: Zip ARM64
      run: Compress-Archive -Path ./publish-arm64/* -DestinationPath ClaudeUsage-Windows-ARM64.zip
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-builds
        path: |
          ClaudeUsage-Windows-x64.zip
          ClaudeUsage-Windows-ARM64.zip
          
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ClaudeUsage-Windows-x64.zip
          ClaudeUsage-Windows-ARM64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}